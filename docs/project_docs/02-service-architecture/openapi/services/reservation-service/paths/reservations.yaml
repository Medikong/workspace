post:
  summary: Create reservation
  operationId: createReservation
  parameters:
    - $ref: ../../../common/components.yaml#/components/parameters/RequestId
    - $ref: ../../../common/components.yaml#/components/parameters/IdempotencyKey
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../openapi.yaml#/components/schemas/CreateReservationRequest
  responses:
    "201":
      description: Reservation created.
      content:
        application/json:
          schema:
            $ref: ../openapi.yaml#/components/schemas/Reservation
    "400":
      $ref: ../../../common/components.yaml#/components/responses/BadRequest
    "401":
      $ref: ../../../common/components.yaml#/components/responses/Unauthorized
    "409":
      $ref: ../../../common/components.yaml#/components/responses/Conflict
    "422":
      $ref: ../../../common/components.yaml#/components/responses/UnprocessableEntity
    "500":
      $ref: ../../../common/components.yaml#/components/responses/InternalServerError
