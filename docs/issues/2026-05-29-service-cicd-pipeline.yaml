  description: |
    ## 목표
    새 6개 서비스 기준 변경 서비스 단위 테스트와 Docker 이미지 빌드 흐름 재정비

    ## 배경
    - 서로 다른 서비스 기준의 단위 테스트 대상과 이미지 빌드 대상
    - 전체 서비스 실행 중심 workflow와 불명확한 변경 서비스 경계
    - repo별 소유 경계를 지킨 `service`와 `gitops` 작업 분리 필요성
    - ECR 레지스트리 부재로 Container Registry push 진행 불가
    - AWS dev 인프라 부재로 실제 Kubernetes CD 진행 불가

    ## 범위
    - 포함: 서비스별 CI 분리, 테스트 개선, Docker 이미지 빌드 자동화, Private ECR 레지스트리 준비, GitOps 정적 검증 개선
    - 제외: Container Registry push 자동화, GitOps 배포 선언 변경, 실제 Kubernetes 배포 실행, Argo sync, AWS dev 인프라 구성, 운영 환경 secret 발급

    ## 완료 기준
    - 하위 이슈 발행 단위 합의
    - 담당 repo별 하위 이슈 배치
    - image push 작업의 후속 분리 기준 확인
    - 실제 CD 작업의 후속 분리 기준 확인
    - Project와 Sprint milestone 연결 기준 확인
