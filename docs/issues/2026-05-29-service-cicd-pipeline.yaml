  description: |
    ## 목표
    현재 GitOps 선언의 Helm rendering과 Argo Application·values 파일 불일치를 함께 검증하는 GitOps validation workflow

    ## 배경
    - Argo manifest 기본 필드 존재 여부 중심의 현재 검증
    - valueFiles 불일치 누락 가능성
    - values 파일과 Argo Application 목록 차이의 누락 가능성
    - AWS dev 인프라 부재로 실제 Argo sync와 rollout 검증 불가

    ## 범위
    - 포함: Argo Application valueFiles 존재 검사, values와 Argo Application 서비스 목록 비교, GitOps validation workflow 반영
    - 제외: 서비스 CI 테스트, image build workflow, image push workflow, GitOps 배포 선언 변경, 실제 Kubernetes 배포

    ## 작업 메모
    - Argo valueFiles 검사
    - service 목록 비교
    - 누락 파일과 서비스명이 보이는 실패 메시지
