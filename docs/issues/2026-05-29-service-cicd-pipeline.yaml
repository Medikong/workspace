- local_id: cicd.service-image-build
  title: 변경 서비스 기준 Docker 이미지 빌드 자동화
  type: implementation
  repository: service
  milestone: sprint-0-planning
  parent: cicd.refactor
  labels:
  - docker
  - registry
  depends_on: []
  description: |
    ## 목표
    변경된 서비스만 Docker image를 빌드하는 `service` repo workflow

    ## 배경
    - 서비스별 Dockerfile context와 image repository 기준 차이
    - 배포 단계로 전달할 image tag와 digest 필요성
    - ECR 레지스트리 부재로 registry 인증과 push 권한 연결 불가

    ## 범위
    - 포함: 서비스별 build context, image tag, image digest 산출, build 실패 처리
    - 제외: Container Registry push, registry 인증 설정, Kubernetes 배포 선언 수정, Argo sync 방식 결정

    ## 작업 메모
    - commit SHA tag와 보조 tag 처리
    - image digest 출력
    - push 자동화 후속 이슈 분리
  done_when:
  - 변경 서비스 기준 image build workflow 반영
  - 서비스별 image tag와 digest 산출
