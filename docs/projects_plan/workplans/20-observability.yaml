---
"$schema": "./linear-workplan.schema.json"
version: 1
defaults:
  team: KT CloudNative Study
  project: KT CloudNative Study 심화 프로젝트
  state: Backlog
  priority: 3
  labels:
  - kt-cloudnative-study
  - observability
tasks:
- local_id: observability.metrics-inventory
  title: 서비스별 메트릭 노출 상태를 확인한다
  type: implementation
  milestone: sprint-1-baseline
  labels:
  - scenario:s2
  - epic:lgtm-observability
  - metrics
  depends_on:
  - e2e.normal-flow-capture
  description: |
    ## 목표
    장애 관측 시나리오에 필요한 서비스별 `/metrics` 또는 Prometheus scrape 대상을 확인한다.

    ## 완료 조건
    - 서비스별 metric endpoint 또는 scrape 가능 여부가 정리되어 있다.
    - 요청 수, 응답 시간, 에러율로 사용할 metric 후보가 정리되어 있다.
    - 누락된 계측이 있으면 후속 작업으로 분리되어 있다.

    ## 남길 증거
    - 메트릭 인벤토리
    - scrape 대상 목록
  done_when:
  - 서비스별 메트릭 노출 상태가 정리되어 있다.
  - 장애 관측에 사용할 metric 후보가 정해져 있다.
  evidence:
  - 메트릭 인벤토리
  - scrape 대상 목록
  metrics:
  - http_requests_total
  - http_request_duration_seconds
  - error_rate
  estimate: 1.0
- local_id: observability.prometheus-scrape
  title: Prometheus가 서비스 메트릭을 수집하도록 연결한다
  type: implementation
  milestone: sprint-2-operations-policy
  labels:
  - scenario:s2
  - epic:lgtm-observability
  - prometheus
  depends_on:
  - observability.metrics-inventory
  description: |
    ## 목표
    Prometheus가 핵심 서비스 메트릭을 수집하도록 ServiceMonitor 또는 scrape config를 연결한다.

    ## 완료 조건
    - Prometheus target에서 핵심 서비스가 up 상태로 보인다.
    - 주요 metric query가 성공한다.
    - 수집 실패 항목과 원인이 기록되어 있다.

    ## 남길 증거
    - Prometheus target 캡처
    - Prometheus query 결과
  done_when:
  - 핵심 서비스 메트릭이 Prometheus에서 조회된다.
  - target 상태와 query 결과가 기록되어 있다.
  evidence:
  - Prometheus target 캡처
  - Prometheus query 결과
  metrics:
  - scrape_target_count
  - http_requests_total
  estimate: 1.5
- local_id: observability.grafana-panels
  title: Grafana에 에러율과 응답시간 패널을 구성한다
  type: implementation
  milestone: sprint-2-operations-policy
  labels:
  - scenario:s2
  - epic:lgtm-observability
  - grafana
  depends_on:
  - observability.prometheus-scrape
  description: |
    ## 목표
    장애 전후 변화를 설명할 수 있도록 서비스별 에러율과 응답시간 패널을 구성한다.

    ## 완료 조건
    - 서비스별 요청 수, 에러율, 응답시간 패널이 있다.
    - 장애 주입 전 정상 기준값을 확인할 수 있다.
    - 발표에 사용할 화면 구성이 정리되어 있다.

    ## 남길 증거
    - Grafana 대시보드 캡처
    - Prometheus query 목록
  done_when:
  - 에러율과 응답시간 패널이 Grafana에서 확인된다.
  - 발표에 사용할 패널 캡처 후보가 정리되어 있다.
  evidence:
  - Grafana 대시보드 캡처
  - Prometheus query 목록
  metrics:
  - error_rate
  - request_latency
  estimate: 1.0
- local_id: observability.log-path
  title: Loki 로그 조회 경로 또는 대체 로그 조회 경로를 확인한다
  type: implementation
  milestone: sprint-2-operations-policy
  labels:
  - scenario:s2
  - epic:lgtm-observability
  - logs
  - lgtm
  depends_on:
  - observability.metrics-inventory
  description: |
    ## 목표
    장애 시점의 서비스 로그를 확인할 수 있도록 Loki 또는 단기 대체 로그 조회 경로를 정리한다.

    ## 완료 조건
    - Loki가 사용 가능하면 핵심 서비스 로그 조회 query가 정리되어 있다.
    - Loki가 아직 준비되지 않았다면 `kubectl logs`, 컨테이너 로그, 클라우드 로그 중 단기 대체 경로가 정리되어 있다.
    - 장애 주입 시점과 로그 조회 시점을 연결하는 방법이 문서화되어 있다.

    ## 남길 증거
    - 로그 조회 경로
    - 로그 query 또는 명령 예시
  done_when:
  - 장애 시점의 서비스 로그를 조회할 수 있는 경로가 정해져 있다.
  - 발표에 사용할 로그 증거 확보 방법이 문서화되어 있다.
  evidence:
  - 로그 조회 경로
  - 로그 query 또는 명령 예시
  estimate: 1.0
- local_id: observability.tracing-decision
  title: Tempo 또는 Jaeger tracing 도입 여부를 결정한다
  type: design
  milestone: sprint-2-operations-policy
  priority: 4
  labels:
  - scenario:s2
  - epic:lgtm-observability
  - tracing
  - lgtm
  depends_on:
  - observability.metrics-inventory
  - e2e.normal-flow-capture
  description: |
    ## 목표
    5주 일정 안에서 Tempo 또는 Jaeger tracing을 발표 핵심으로 넣을지, 후속 과제로 둘지 결정한다.

    ## 완료 조건
    - 현재 서비스가 trace context를 전달할 수 있는지 확인되어 있다.
    - Tempo/Jaeger 설치 또는 연동 비용이 Sprint 2 안에 가능한지 판단되어 있다.
    - 도입하지 않는다면 이유와 후속 과제가 기록되어 있다.

    ## 남길 증거
    - tracing 도입 판단 기록
    - trace context gap 목록
  done_when:
  - tracing을 P1로 구현할지 후속 과제로 둘지 결정되어 있다.
  - 결정 이유와 gap이 문서화되어 있다.
  evidence:
  - tracing 도입 판단 기록
  - trace context gap 목록
  estimate: 0.5
- local_id: observability.failure-injection-procedure
  title: 예약 또는 처방 서비스 장애 주입 절차를 작성한다
  type: experiment
  milestone: sprint-2-operations-policy
  labels:
  - scenario:s2
  - epic:lgtm-observability
  - failure-injection
  depends_on:
  - e2e.normal-flow-procedure
  description: |
    ## 목표
    예약 또는 처방 서비스 장애를 안전하게 재현하는 절차를 작성한다.

    ## 완료 조건
    - 중단할 서비스와 중단 방식이 정해져 있다.
    - 장애 전 정상 흐름 확인, 장애 실행, 복구 순서가 정리되어 있다.
    - 실험 후 되돌리는 방법이 명확하다.

    ## 남길 증거
    - 장애 주입 절차
    - 복구 절차
  done_when:
  - 장애 주입과 복구 절차가 문서화되어 있다.
  - 실험 대상 서비스와 기대 영향 범위가 정리되어 있다.
  evidence:
  - 장애 주입 절차
  - 복구 절차
  estimate: 1.0
- local_id: observability.failure-capture
  title: 장애 전후 지표 변화를 캡처한다
  type: experiment
  milestone: sprint-2-operations-policy
  labels:
  - scenario:s2
  - epic:lgtm-observability
  - evidence
  depends_on:
  - observability.grafana-panels
  - observability.log-path
  - observability.failure-injection-procedure
  description: |
    ## 목표
    장애 주입을 실행하고 에러율, 응답시간, 로그 변화로 영향 범위를 설명할 수 있게 증거를 남긴다.

    ## 완료 조건
    - 장애 전후 지표 변화가 확인된다.
    - 실패한 서비스와 영향을 받은 호출 흐름을 설명할 수 있다.
    - 발표에 사용할 캡처가 남아 있다.

    ## 남길 증거
    - Grafana 장애 전후 캡처
    - 장애 주입 실행 로그
    - 서비스 로그
    - 로그 조회 결과
  done_when:
  - 장애 전후 에러율 또는 응답시간 변화가 확인되어 있다.
  - 발표에 사용할 장애 관측 증거가 정리되어 있다.
  evidence:
  - Grafana 장애 전후 캡처
  - 장애 주입 실행 로그
  - 서비스 로그
  - 로그 조회 결과
  metrics:
  - error_rate
  - request_latency
  - failed_request_count
  estimate: 1.5
