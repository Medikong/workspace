---
"$schema": "./linear-workplan.schema.json"
version: 1
defaults:
  team: KT CloudNative Study
  project: KT CloudNative Study 심화 프로젝트
  state: Backlog
  priority: 3
  labels:
  - kt-cloudnative-study
  - planning
milestones:
- id: phase-0-planning
  title: Phase 0 - 계획과 백로그 확정
  goal: MVP 범위, 핵심 시나리오, Epic, workplan, 역할을 확정한다.
- id: sprint-1-baseline
  title: Sprint 1 - 기준선과 E2E 확보
  goal: 정상 사용자 흐름과 검증 기준선을 확보한다.
- id: sprint-2-operations-policy
  title: Sprint 2 - 운영 기능과 정책 구현
  goal: 장애, 보안, 통신 통제 시나리오를 실제로 검증한다.
- id: sprint-3-experiment-freeze
  title: Sprint 3 - 실험 결과 Freeze
  goal: 2026-06-19까지 발표에 사용할 실험과 검증 결과를 고정한다.
- id: final-prep
  title: Final Prep - 발표 준비와 리허설
  goal: 새 실험 없이 발표 자료, 리허설, 백업 캡처를 준비한다.
tasks:
- local_id: foundation.scope-prioritization
  title: PRD 요구사항을 5주 일정 MVP 범위로 재분류한다
  type: planning
  milestone: phase-0-planning
  labels:
  - scenario:s1
  - scenario:s6
  - epic:foundation
  - planning
  depends_on: []
  description: |
    ## 목표
    `docs/projects_plan/plan/00-PRD.md`의 필수/선택 과업을 2026-06-19까지 검증 결과를 확보할 수 있는 Must/Should/Could/Won't 범위로 재분류한다.

    ## 완료 조건
    - Must Have와 Should Have가 팀 단위로 합의되어 있다.
    - 발표 핵심 시나리오와 후순위 과업이 분리되어 있다.
    - 제외하거나 후속 과제로 미룰 항목의 이유가 기록되어 있다.

    ## 남길 증거
    - 범위 재분류 기록
    - Sprint Planning 합의 내용
  done_when:
  - Must/Should/Could/Won't 범위가 문서화되어 있다.
  - P0 검증 시나리오와 후순위 과업이 분리되어 있다.
  evidence:
  - docs/projects_plan/plan/02-PROJECT_PLAN.md
  - Sprint Planning 기록
  estimate: 0.5
- local_id: foundation.p0-scenarios
  title: P0 검증 시나리오를 확정한다
  type: planning
  milestone: phase-0-planning
  labels:
  - scenario:s1
  - scenario:s2
  - scenario:s3
  - scenario:s4
  - epic:foundation
  depends_on:
  - foundation.scope-prioritization
  - foundation.prd-traceability
  description: |
    ## 목표
    Sprint 1과 Sprint 2에서 반드시 검증할 P0 시나리오를 확정한다.

    ## 완료 조건
    - S1 정상 흐름, S2 장애 관측, S3 통신 차단, S4 보안 스캔 중 발표 핵심 시나리오가 확정되어 있다.
    - 각 시나리오의 성공 기준과 증거 유형이 정리되어 있다.
    - P1/P2 시나리오가 P0 작업을 막지 않도록 분리되어 있다.

    ## 남길 증거
    - 시나리오 우선순위 표
    - Sprint 2 후보 이슈 목록
  done_when:
  - P0 시나리오가 확정되어 있다.
  - 각 P0 시나리오의 성공 기준과 증거 유형이 기록되어 있다.
  evidence:
  - docs/projects_plan/plan/05-scenarios/README.md
  - Sprint Planning 기록
  estimate: 0.5
- local_id: foundation.prd-traceability
  title: PRD 요구사항 추적표로 누락 항목을 확인한다
  type: planning
  milestone: phase-0-planning
  labels:
  - scenario:s6
  - epic:foundation
  - requirements
  - traceability
  depends_on:
  - foundation.scope-prioritization
  description: |
    ## 목표
    `docs/projects_plan/plan/00-PRD.md`의 기본/심화 필수·선택 항목이 Scenario, Epic, workplan 중 어디에 반영되는지 확인한다.

    ## 완료 조건
    - 기본 프로젝트 승계 항목, 심화 프로젝트 신규 항목, PRD 외 실행 필수 항목이 구분되어 있다.
    - GitOps/ArgoCD, AWS demo/QA, LGTM 관측성 같은 누락되기 쉬운 축이 추적표에 반영되어 있다.
    - P0/P1/P2 또는 후속 과제 판단이 기록되어 있다.

    ## 남길 증거
    - PRD 요구사항 추적표
    - gap 목록
  done_when:
  - PRD 요구사항 추적표가 작성되어 있다.
  - 누락 항목과 후속 과제가 분리되어 있다.
  evidence:
  - docs/projects_plan/plan/01-PRD_TRACEABILITY.md
  - gap 목록
  estimate: 0.5
- local_id: foundation.roles-ownership
  title: 팀 역할과 소유 영역을 정리한다
  type: planning
  milestone: phase-0-planning
  labels:
  - scenario:s6
  - epic:foundation
  - collaboration
  depends_on:
  - foundation.scope-prioritization
  description: |
    ## 목표
    App, Platform, Observability, Security, QA, PM 역할과 각자의 소유 영역을 정리한다.

    ## 완료 조건
    - 역할별 책임과 주요 산출물이 정리되어 있다.
    - 공통 manifest, README, 발표 자료처럼 충돌 가능성이 높은 파일의 수정 규칙이 정해져 있다.
    - 담당자가 미정인 영역은 리스크로 표시되어 있다.

    ## 남길 증거
    - 역할/소유 영역 표
    - 공통 파일 수정 규칙
  done_when:
  - 역할별 책임과 소유 영역이 문서화되어 있다.
  - 공통 파일 수정 규칙이 합의되어 있다.
  evidence:
  - 역할/소유 영역 표
  - 공통 파일 수정 규칙
  estimate: 0.5
- local_id: foundation.ready-definition
  title: 이슈 Ready 기준과 완료 기준을 정한다
  type: planning
  milestone: phase-0-planning
  labels:
  - scenario:s6
  - epic:foundation
  - issue-management
  depends_on:
  - foundation.p0-scenarios
  - foundation.roles-ownership
  description: |
    ## 목표
    GitHub Projects 또는 Linear에 올릴 이슈가 Ready 상태로 들어가기 위한 기준과 Definition of Done을 정한다.

    ## 완료 조건
    - 이슈마다 Scenario, Epic, Depends on, Evidence, Done 조건을 갖추도록 합의되어 있다.
    - 구현 완료와 검증 완료가 분리되어 있다.
    - Blocked 상태로 이동할 조건이 정리되어 있다.

    ## 남길 증거
    - 이슈 작성 규칙
    - Ready/Done 체크리스트
  done_when:
  - Ready 기준과 Definition of Done이 문서화되어 있다.
  - 이슈 템플릿에 Evidence와 Dependency 항목이 포함되어 있다.
  evidence:
  - docs/projects_plan/workplans/README.md
  - Ready/Done 체크리스트
  estimate: 0.5
