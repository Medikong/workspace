---
"$schema": "./linear-workplan.schema.json"
version: 1
defaults:
  team: KT CloudNative Study
  project: KT CloudNative Study 심화 프로젝트
  state: Backlog
  priority: 3
  labels:
  - kt-cloudnative-study
  - traffic-policy
tasks:
- local_id: traffic.call-matrix
  title: 서비스 간 허용/차단 호출 매트릭스를 작성한다
  type: design
  milestone: sprint-2-operations-policy
  labels:
  - scenario:s3
  - epic:traffic-policy
  - networking
  depends_on:
  - e2e.normal-flow-capture
  description: |
    ## 목표
    서비스 간 어떤 호출은 허용하고 어떤 호출은 차단할지 매트릭스로 정리한다.

    ## 완료 조건
    - 정상 사용자 흐름에 필요한 허용 호출이 정리되어 있다.
    - 직접 호출을 차단할 서비스 관계가 정리되어 있다.
    - Gateway 경유 호출과 내부 서비스 호출이 구분되어 있다.

    ## 남길 증거
    - 허용/차단 호출 매트릭스
    - 핵심 요청 흐름 설명
  done_when:
  - 허용/차단 호출 관계가 문서화되어 있다.
  - 정책 검증에 사용할 호출 쌍이 정해져 있다.
  evidence:
  - 허용/차단 호출 매트릭스
  - 핵심 요청 흐름 설명
  estimate: 0.5
- local_id: traffic.gateway-mesh-decision
  title: Gateway와 Service Mesh 책임 경계를 결정한다
  type: design
  milestone: sprint-2-operations-policy
  labels:
  - scenario:s3
  - epic:traffic-policy
  - service-mesh
  depends_on:
  - traffic.call-matrix
  - observability.prometheus-scrape
  description: |
    ## 목표
    API Gateway, NetworkPolicy, Service Mesh가 각각 어떤 책임을 맡을지 결정한다.

    ## 완료 조건
    - Gateway는 외부 진입과 인증/라우팅, NetworkPolicy는 네트워크 접근 제어, Mesh는 서비스 간 정책/관측 보강으로 구분되어 있다.
    - Istio/Linkerd 도입 또는 보류 기준이 기록되어 있다.
    - Sprint 2에서 검증할 최소 정책 범위가 정해져 있다.

    ## 남길 증거
    - Gateway/Mesh 책임 경계 결정 기록
    - 선택 기준 표
  done_when:
  - Gateway, NetworkPolicy, Mesh의 책임 경계가 문서화되어 있다.
  - Sprint 2에서 검증할 최소 정책 범위가 정해져 있다.
  evidence:
  - Gateway/Mesh 책임 경계 결정 기록
  - 선택 기준 표
  estimate: 0.5
- local_id: traffic.network-policy
  title: NetworkPolicy 기본 정책을 작성한다
  type: implementation
  milestone: sprint-2-operations-policy
  labels:
  - scenario:s3
  - epic:traffic-policy
  - networkpolicy
  depends_on:
  - traffic.call-matrix
  description: |
    ## 목표
    허용/차단 매트릭스를 기준으로 최소 NetworkPolicy를 작성한다.

    ## 완료 조건
    - 기본 deny 또는 필요한 차단 정책이 정의되어 있다.
    - 정상 흐름에 필요한 허용 규칙이 포함되어 있다.
    - 정책 적용 전후 테스트 방법이 정리되어 있다.

    ## 남길 증거
    - NetworkPolicy manifest
    - 적용 전후 테스트 계획
  done_when:
  - NetworkPolicy manifest가 작성되어 있다.
  - 허용/차단 검증 방법이 정리되어 있다.
  evidence:
  - NetworkPolicy manifest
  - 적용 전후 테스트 계획
  estimate: 1.5
- local_id: traffic.allowed-call-verify
  title: 허용된 서비스 호출이 성공하는지 확인한다
  type: test
  milestone: sprint-2-operations-policy
  labels:
  - scenario:s3
  - epic:traffic-policy
  - verify
  depends_on:
  - traffic.network-policy
  description: |
    ## 목표
    정책 적용 후 정상 사용자 흐름에 필요한 허용 호출이 계속 성공하는지 확인한다.

    ## 완료 조건
    - 허용 호출이 성공한다.
    - 정상 사용자 흐름이 정책 적용 후에도 깨지지 않는다.
    - 실패 시 허용 규칙 누락 여부가 기록된다.

    ## 남길 증거
    - 허용 호출 결과
    - 정상 흐름 재검증 결과
  done_when:
  - 허용된 서비스 호출이 성공한다.
  - 정상 사용자 흐름이 정책 적용 후에도 통과한다.
  evidence:
  - 허용 호출 결과
  - 정상 흐름 재검증 결과
  estimate: 1.0
- local_id: traffic.denied-call-verify
  title: 비인가 서비스 호출이 실패하는지 확인한다
  type: test
  milestone: sprint-2-operations-policy
  labels:
  - scenario:s3
  - epic:traffic-policy
  - verify
  depends_on:
  - traffic.network-policy
  description: |
    ## 목표
    허용되지 않은 서비스 간 직접 호출이 정책으로 차단되는지 확인한다.

    ## 완료 조건
    - 차단 대상 호출이 실패한다.
    - 실패가 정책에 의한 것인지 설명할 수 있다.
    - 명령 결과 또는 로그가 남아 있다.

    ## 남길 증거
    - 차단 호출 결과
    - 정책 적용 로그
  done_when:
  - 비인가 서비스 호출이 실패한다.
  - 실패 결과가 증거로 남아 있다.
  evidence:
  - 차단 호출 결과
  - 정책 적용 로그
  estimate: 1.0
- local_id: traffic.policy-evidence
  title: 통신 정책 적용 전후 결과를 발표 자료로 정리한다
  type: docs
  milestone: sprint-3-experiment-freeze
  labels:
  - scenario:s3
  - epic:traffic-policy
  - evidence
  depends_on:
  - traffic.allowed-call-verify
  - traffic.denied-call-verify
  description: |
    ## 목표
    허용 호출과 차단 호출 결과를 발표에서 설명 가능한 형태로 정리한다.

    ## 완료 조건
    - 정책 적용 전후 차이가 표나 캡처로 정리되어 있다.
    - Gateway, NetworkPolicy, Mesh 책임 경계와 연결되어 설명된다.
    - 실패하거나 미완성인 정책은 후속 과제로 분리되어 있다.

    ## 남길 증거
    - 정책 적용 전후 결과표
    - 발표용 캡처
  done_when:
  - 허용/차단 검증 결과가 발표 자료로 정리되어 있다.
  - 미완성 정책이 후속 과제로 분류되어 있다.
  evidence:
  - 정책 적용 전후 결과표
  - 발표용 캡처
  estimate: 0.5
