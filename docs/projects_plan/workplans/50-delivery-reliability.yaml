---
"$schema": "./linear-workplan.schema.json"
version: 1
defaults:
  team: KT CloudNative Study
  project: KT CloudNative Study 심화 프로젝트
  state: Backlog
  priority: 3
  labels:
  - kt-cloudnative-study
  - delivery
tasks:
- local_id: delivery.target-service
  title: 독립 배포 검증 대상 서비스를 선택한다
  type: planning
  milestone: sprint-3-experiment-freeze
  priority: 4
  labels:
  - scenario:s5
  - epic:delivery-reliability
  - deployment
  depends_on:
  - e2e.normal-flow-capture
  description: |
    ## 목표
    독립 배포 검증에 사용할 서비스 1개를 선택한다.

    ## 완료 조건
    - 정상 사용자 흐름에 포함되면서 재배포 영향이 관찰 가능한 서비스가 선택되어 있다.
    - 선택 이유와 제외한 후보가 정리되어 있다.
    - Sprint 2에서 처리할지 Sprint 3 후속으로 둘지 결정되어 있다.

    ## 남길 증거
    - 대상 서비스 선정 기록
    - 선택/제외 기준
  done_when:
  - 독립 배포 검증 대상 서비스가 선택되어 있다.
  - 선택 이유와 일정 판단이 기록되어 있다.
  evidence:
  - 대상 서비스 선정 기록
  - 선택/제외 기준
  estimate: 0.5
- local_id: delivery.probes-pdb-review
  title: 대상 서비스의 readiness/liveness와 PDB 기준을 확인한다
  type: implementation
  milestone: sprint-3-experiment-freeze
  priority: 4
  labels:
  - scenario:s5
  - epic:delivery-reliability
  - kubernetes
  depends_on:
  - delivery.target-service
  description: |
    ## 목표
    단일 서비스 재배포 전에 readiness/liveness와 PDB 적용 가능성을 확인한다.

    ## 완료 조건
    - 대상 서비스의 probe 설정이 확인되어 있다.
    - PDB 적용 여부와 최소 가용성 기준이 정리되어 있다.
    - 바로 적용하기 어렵다면 후속 작업으로 분리되어 있다.

    ## 남길 증거
    - probe 설정 확인 결과
    - PDB 적용 기준
  done_when:
  - 대상 서비스의 probe와 PDB 기준이 정리되어 있다.
  - 적용 불가 항목은 후속 작업으로 분리되어 있다.
  evidence:
  - probe 설정 확인 결과
  - PDB 적용 기준
  estimate: 1.0
- local_id: delivery.single-service-redeploy
  title: 대상 서비스만 재배포하는 절차를 작성하고 실행한다
  type: ops
  milestone: sprint-3-experiment-freeze
  priority: 4
  labels:
  - scenario:s5
  - epic:delivery-reliability
  - deployment
  depends_on:
  - delivery.target-service
  - delivery.probes-pdb-review
  - gitops.rollback-runbook
  description: |
    ## 목표
    대상 서비스만 재배포하고 rollout 상태를 확인한다.

    ## 완료 조건
    - 대상 서비스만 재배포된다.
    - rollout status가 확인된다.
    - 실패 시 되돌릴 방법이 기록되어 있다.

    ## 남길 증거
    - 재배포 명령 또는 절차
    - `kubectl rollout status` 결과
  done_when:
  - 대상 서비스만 재배포되는 절차가 확인되어 있다.
  - rollout 결과가 기록되어 있다.
  evidence:
  - 재배포 명령 또는 절차
  - kubectl rollout status 결과
  estimate: 1.5
- local_id: delivery.e2e-after-redeploy
  title: 재배포 후 정상 사용자 흐름을 재검증한다
  type: test
  milestone: sprint-3-experiment-freeze
  priority: 4
  labels:
  - scenario:s5
  - epic:delivery-reliability
  - e2e
  depends_on:
  - delivery.single-service-redeploy
  - e2e.normal-flow-procedure
  description: |
    ## 목표
    단일 서비스 재배포 후 핵심 사용자 흐름이 계속 정상 동작하는지 확인한다.

    ## 완료 조건
    - 재배포 후 정상 사용자 흐름이 통과한다.
    - 실패 시 어느 서비스나 경계에서 문제가 생겼는지 기록된다.
    - 배포 전후 지표 변화가 있으면 함께 기록된다.

    ## 남길 증거
    - E2E 재검증 결과
    - 배포 전후 로그 또는 지표
  done_when:
  - 재배포 후 정상 사용자 흐름이 재검증되어 있다.
  - 실패 또는 영향 범위가 기록되어 있다.
  evidence:
  - E2E 재검증 결과
  - 배포 전후 로그 또는 지표
  estimate: 1.0
- local_id: delivery.deployment-evidence
  title: 독립 배포 결과와 영향 범위를 정리한다
  type: docs
  milestone: sprint-3-experiment-freeze
  priority: 4
  labels:
  - scenario:s5
  - epic:delivery-reliability
  - evidence
  depends_on:
  - delivery.e2e-after-redeploy
  related_to:
  - observability.grafana-panels
  description: |
    ## 목표
    단일 서비스 재배포 결과를 운영 안정성 시나리오로 발표할 수 있게 정리한다.

    ## 완료 조건
    - 재배포 절차, rollout 결과, E2E 재검증 결과가 연결되어 있다.
    - 독립 배포 검증이 미완성이라면 후속 과제로 명확히 표시되어 있다.
    - 발표 핵심 또는 부록 중 어디에 둘지 결정되어 있다.

    ## 남길 증거
    - 독립 배포 결과 요약
    - 후속 과제 목록
  done_when:
  - 독립 배포 검증 결과가 정리되어 있다.
  - 발표 핵심 또는 부록 배치가 결정되어 있다.
  evidence:
  - 독립 배포 결과 요약
  - 후속 과제 목록
  estimate: 0.5
