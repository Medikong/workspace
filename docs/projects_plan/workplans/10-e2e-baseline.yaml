  - e2e
tasks:
- local_id: e2e.service-dns
  title: 서비스별 Kubernetes Service와 DNS 이름을 확인한다
  type: test
  milestone: sprint-1-baseline
  labels:
  - scenario:s1
  - epic:e2e-baseline
  - kubernetes
  depends_on:
  - foundation.ready-definition
  - gitops.argocd-sync-smoke
  description: |
    ## 목표
    정상 사용자 흐름 검증 전에 각 서비스가 Kubernetes DNS와 ClusterIP로 접근 가능한지 확인한다.

    ## 완료 조건
    - 핵심 서비스의 Service 이름과 namespace가 정리되어 있다.
    - 클러스터 내부에서 DNS resolve와 기본 연결이 확인된다.
    - 실패한 서비스가 있으면 원인과 후속 작업이 기록되어 있다.

    ## 남길 증거
    - `kubectl get svc` 결과
    - 내부 DNS 확인 로그
  done_when:
  - 핵심 서비스 DNS와 ClusterIP가 확인되어 있다.
  - 연결 실패 항목이 있으면 후속 작업으로 분리되어 있다.
  evidence:
  - kubectl get svc 결과
  - 내부 DNS 확인 로그
  estimate: 1.0
- local_id: e2e.gateway-routing
  title: Gateway 또는 Ingress 경로 라우팅을 검증한다
  type: test
  milestone: sprint-1-baseline
  labels:
  - scenario:s1
  - epic:e2e-baseline
  - gateway
  depends_on:
  - e2e.service-dns
  description: |
    ## 목표
    외부 또는 테스트 클라이언트 요청이 Gateway/Ingress를 통해 의도한 서비스로 라우팅되는지 확인한다.

    ## 완료 조건
    - 핵심 API 경로와 대상 서비스가 매핑되어 있다.
    - 성공 응답과 실패 응답이 구분되어 기록되어 있다.
    - 인증/JWT가 필요한 경로는 테스트 방식이 정리되어 있다.

    ## 남길 증거
    - 라우팅 매트릭스
    - API 호출 결과
  done_when:
  - 핵심 API 경로가 Gateway/Ingress를 통해 라우팅된다.
  - 경로별 대상 서비스가 문서화되어 있다.
  evidence:
  - 라우팅 매트릭스
  - API 호출 결과
  estimate: 1.0
- local_id: e2e.test-data
  title: 정상 사용자 흐름 테스트 데이터를 준비한다
  type: test
  milestone: sprint-1-baseline
  labels:
  - scenario:s1
  - epic:e2e-baseline
  - test-data
  depends_on:
  - foundation.p0-scenarios
  description: |
    ## 목표
    환자 조회, 예약 생성, 알림 발송 흐름을 반복 실행할 수 있는 최소 테스트 데이터를 준비한다.

    ## 완료 조건
    - 테스트 환자, 예약, 인증 정보 등 필요한 입력값이 정리되어 있다.
    - 재실행 시 충돌하거나 오염되는 데이터가 구분되어 있다.
    - 민감정보를 쓰지 않는 테스트 데이터 원칙이 정리되어 있다.

    ## 남길 증거
    - 테스트 데이터 목록
    - 재실행 주의사항
  done_when:
  - 정상 흐름 실행에 필요한 테스트 데이터가 준비되어 있다.
  - 재실행 가능한 입력값과 주의사항이 문서화되어 있다.
  evidence:
  - 테스트 데이터 목록
  - 재실행 주의사항
  estimate: 0.5
- local_id: e2e.normal-flow-procedure
  title: 정상 사용자 흐름 E2E 절차를 작성한다
  type: test
  milestone: sprint-1-baseline
  labels:
  - scenario:s1
  - epic:e2e-baseline
  - e2e
  depends_on:
  - e2e.gateway-routing
  - e2e.test-data
  description: |
    ## 목표
    핵심 사용자 흐름을 다른 팀원이 따라 실행할 수 있는 절차로 작성한다.

    ## 완료 조건
    - 요청 순서, 입력값, 기대 응답이 정리되어 있다.
    - 수동 실행과 자동화 후보가 구분되어 있다.
    - 실패 시 확인할 로그 위치가 적혀 있다.

    ## 남길 증거
    - E2E 절차 문서
    - 요청/응답 예시
  done_when:
  - 정상 사용자 흐름 절차가 재현 가능한 수준으로 작성되어 있다.
  - 기대 응답과 실패 시 확인 지점이 포함되어 있다.
  evidence:
  - E2E 절차 문서
  - 요청/응답 예시
  estimate: 1.0
- local_id: e2e.normal-flow-capture
  title: 정상 사용자 흐름 결과를 캡처하고 기준선으로 고정한다
  type: test
  milestone: sprint-1-baseline
  labels:
  - scenario:s1
  - epic:e2e-baseline
  - evidence
  depends_on:
  - e2e.normal-flow-procedure
  description: |
    ## 목표
    정상 사용자 흐름을 실제로 실행하고 이후 장애/배포 검증의 기준선으로 사용할 결과를 남긴다.

    ## 완료 조건
    - 정상 흐름이 한 번 이상 성공했다.
    - API 응답, 서비스 로그, 요청 흐름 중 최소 하나 이상의 증거가 남아 있다.
    - 실패한 단계가 있으면 Sprint 2 전에 해결할 후속 이슈로 분리되어 있다.

    ## 남길 증거
    - E2E 실행 결과
    - 서비스 로그
    - 요청 흐름 다이어그램
  done_when:
  - 정상 사용자 흐름이 한 번 이상 성공했다.
  - 결과 증거가 후속 시나리오의 기준선으로 정리되어 있다.
  evidence:
  - E2E 실행 결과
  - 서비스 로그
  - 요청 흐름 다이어그램
  estimate: 1.0
