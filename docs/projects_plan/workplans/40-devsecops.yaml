"$schema": "./linear-workplan.schema.json"
version: 1
defaults:
  team: KT CloudNative Study
  project: KT CloudNative Study 심화 프로젝트
  state: Backlog
  priority: 3
  labels:
  - kt-cloudnative-study
  - devsecops
tasks:
- local_id: devsecops.scan-scope
  title: Trivy config scan 실행 방식과 대상 경로를 정한다
  type: security
  milestone: sprint-2-operations-policy
  labels:
  - scenario:s4
  - epic:devsecops
  - trivy
  depends_on:
  - foundation.ready-definition
  description: |
    ## 목표
    Kubernetes manifest 보안 스캔을 어떤 경로와 명령으로 실행할지 정한다.

    ## 완료 조건
    - scan 대상 manifest 경로가 정리되어 있다.
    - 로컬 실행과 CI 적용 후보가 구분되어 있다.
    - 실패 기준의 최소 범위가 정해져 있다.

    ## 남길 증거
    - scan 대상 경로 목록
    - 실행 명령 초안
  done_when:
  - Trivy config scan 대상과 실행 방식이 정해져 있다.
  - 실패 기준의 최소 범위가 문서화되어 있다.
  evidence:
  - scan 대상 경로 목록
  - 실행 명령 초안
  estimate: 0.5
- local_id: devsecops.current-manifest-scan
  title: 현재 Kubernetes manifest를 스캔한다
  type: security
  milestone: sprint-2-operations-policy
  labels:
  - scenario:s4
  - epic:devsecops
  - trivy
  depends_on:
  - devsecops.scan-scope
  description: |
    ## 목표
    현재 manifest를 기준으로 Trivy config scan을 실행하고 기준 결과를 남긴다.

    ## 완료 조건
    - 현재 manifest의 scan 결과가 기록되어 있다.
    - 발견된 이슈가 차단 대상인지 참고 대상인지 분류되어 있다.
    - scan 실행이 재현 가능하다.

    ## 남길 증거
    - Trivy 실행 결과
    - 발견 이슈 분류표
  done_when:
  - 현재 manifest의 Trivy scan 결과가 기록되어 있다.
  - 발견 이슈가 분류되어 있다.
  evidence:
  - Trivy 실행 결과
  - 발견 이슈 분류표
  metrics:
  - security_violation_count
  estimate: 1.0
- local_id: devsecops.privileged-sample
  title: privileged 컨테이너 실패 샘플을 만든다
  type: security
  milestone: sprint-2-operations-policy
  labels:
  - scenario:s4
  - epic:devsecops
  - trivy
  depends_on:
  - devsecops.scan-scope
  description: |
    ## 목표
    보안 스캔이 실제로 위험한 설정을 차단하는지 확인할 실패 샘플을 만든다.

    ## 완료 조건
    - privileged 컨테이너 또는 root 실행 같은 위험 설정 샘플이 있다.
    - 샘플은 실제 배포 대상과 분리되어 있다.
    - 샘플의 목적과 제거 방법이 기록되어 있다.

    ## 남길 증거
    - 위험 manifest 샘플
    - 샘플 설명
  done_when:
  - 위험 manifest 샘플이 실제 배포 대상과 분리되어 준비되어 있다.
  - 샘플의 목적과 정리 방법이 문서화되어 있다.
  evidence:
  - 위험 manifest 샘플
  - 샘플 설명
  estimate: 0.5
- local_id: devsecops.trivy-failure-capture
  title: 보안 스캔 실패 결과를 캡처한다
  type: security
  milestone: sprint-2-operations-policy
  labels:
  - scenario:s4
  - epic:devsecops
  - evidence
  depends_on:
  - devsecops.current-manifest-scan
  - devsecops.privileged-sample
  description: |
    ## 목표
    위험 manifest 샘플이 Trivy config scan에서 실패하는 결과를 남긴다.

    ## 완료 조건
    - 정상 manifest와 위험 manifest의 결과 차이가 확인된다.
    - 실패 원인과 수정 방향을 설명할 수 있다.
    - CI 적용 여부와 남은 작업이 정리되어 있다.

    ## 남길 증거
    - Trivy 실패 결과
    - 정상/실패 비교
  done_when:
  - 위험 manifest가 Trivy config scan에서 실패한다.
  - 실패 원인과 수정 방향이 정리되어 있다.
  evidence:
  - Trivy 실패 결과
  - 정상/실패 비교
  metrics:
  - security_violation_count
  estimate: 1.0
- local_id: devsecops.scan-summary
  title: 보안 스캔 결과를 발표 자료에 정리한다
  type: docs
  milestone: sprint-3-experiment-freeze
  labels:
  - scenario:s4
  - epic:devsecops
  - evidence
  depends_on:
  - devsecops.trivy-failure-capture
  description: |
    ## 목표
    보안 스캔 시나리오를 배포 전 차단 사례로 설명할 수 있게 정리한다.

    ## 완료 조건
    - 정상/실패 결과가 한 장으로 설명된다.
    - 위험 설정이 왜 문제인지 설명되어 있다.
    - CI 미연동 상태라면 후속 과제로 표시되어 있다.

    ## 남길 증거
    - 발표용 보안 스캔 결과 요약
    - 후속 과제 목록
  done_when:
  - 보안 스캔 성공/실패 결과가 발표 자료로 정리되어 있다.
  - 남은 DevSecOps 확장 과제가 후속 과제로 분류되어 있다.
  evidence:
  - 발표용 보안 스캔 결과 요약
  - 후속 과제 목록
  estimate: 0.5
