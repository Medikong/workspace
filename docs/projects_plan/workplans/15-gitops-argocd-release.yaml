---
"$schema": "./linear-workplan.schema.json"
version: 1
defaults:
  team: KT CloudNative Study
  project: KT CloudNative Study 심화 프로젝트
  state: Backlog
  priority: 3
  labels:
  - kt-cloudnative-study
  - gitops
  - argocd
tasks:
- local_id: gitops.current-path-inventory
  title: 현재 GitOps/ArgoCD 구성과 gap을 확인한다
  type: planning
  milestone: phase-0-planning
  labels:
  - scenario:s7
  - epic:gitops-argocd-release
  - gitops
  - argocd
  depends_on:
  - foundation.scope-prioritization
  - aws.terraform-inventory
  description: |
    ## 목표
    기본 프로젝트에서 만들어진 GitOps/ArgoCD 관련 구성과 AWS 시연 환경에 부족한 gap을 확인한다.

    ## 완료 조건
    - GitOps manifest 경로, ArgoCD Application 후보, overlay 구조가 정리되어 있다.
    - AWS demo/QA 환경에 바로 사용할 수 있는 부분과 수정이 필요한 부분이 구분되어 있다.
    - Terraform, GitOps, 서비스 repo 사이의 책임 경계가 정리되어 있다.

    ## 남길 증거
    - GitOps/ArgoCD 구성 인벤토리
    - AWS 배포 gap 목록
  done_when:
  - 현재 GitOps/ArgoCD 구성과 gap이 문서화되어 있다.
  - AWS demo/QA 환경에 필요한 수정 범위가 정리되어 있다.
  evidence:
  - GitOps/ArgoCD 구성 인벤토리
  - AWS 배포 gap 목록
  estimate: 1.0
- local_id: gitops.argocd-app-scope
  title: AWS demo/QA 환경의 ArgoCD Application 범위를 결정한다
  type: design
  milestone: sprint-1-baseline
  labels:
  - scenario:s7
  - epic:gitops-argocd-release
  - argocd
  depends_on:
  - gitops.current-path-inventory
  - aws.access-runbook
  description: |
    ## 목표
    AWS demo/QA 환경에서 ArgoCD로 관리할 Application 범위와 sync 방식을 결정한다.

    ## 완료 조건
    - 단일 Application, 서비스별 Application, 또는 단기 대체 배포 경로 중 하나가 선택되어 있다.
    - namespace, overlay, cluster context, sync 정책이 정리되어 있다.
    - ArgoCD가 준비되지 않을 경우 사용할 수동 배포 fallback이 정리되어 있다.

    ## 남길 증거
    - ArgoCD Application 범위 결정 기록
    - sync/fallback 기준
  done_when:
  - AWS demo/QA 환경의 ArgoCD 관리 범위가 결정되어 있다.
  - ArgoCD 미준비 시 fallback 배포 기준이 문서화되어 있다.
  evidence:
  - ArgoCD Application 범위 결정 기록
  - sync/fallback 기준
  estimate: 1.0
- local_id: gitops.manifest-update-path
  title: 이미지 tag와 manifest update 기준을 정리한다
  type: ops
  milestone: sprint-1-baseline
  labels:
  - scenario:s7
  - epic:gitops-argocd-release
  - release
  - manifest
  depends_on:
  - gitops.argocd-app-scope
  - aws.image-registry-path
  description: |
    ## 목표
    서비스 이미지가 registry에 올라간 뒤 어떤 manifest 변경으로 AWS 환경에 반영되는지 정리한다.

    ## 완료 조건
    - 이미지 tag, digest, manifest update 위치가 정리되어 있다.
    - GitHub Actions 자동 갱신 또는 수동 PR 방식 중 단기 실행 방식이 결정되어 있다.
    - rollback 시 되돌릴 기준 tag 또는 commit이 정리되어 있다.

    ## 남길 증거
    - image tag 기준
    - manifest update 경로
    - rollback 기준 초안
  done_when:
  - 이미지와 manifest 변경 기준이 문서화되어 있다.
  - GitOps 배포에 사용할 변경 단위가 정해져 있다.
  evidence:
  - image tag 기준
  - manifest update 경로
  - rollback 기준 초안
  estimate: 1.0
- local_id: gitops.argocd-sync-smoke
  title: ArgoCD sync 또는 대체 배포 smoke를 실행한다
  type: test
  milestone: sprint-1-baseline
  labels:
  - scenario:s7
  - epic:gitops-argocd-release
  - smoke
  depends_on:
  - gitops.manifest-update-path
  - aws.demo-deploy-smoke
  description: |
    ## 목표
    GitOps/ArgoCD 경로 또는 합의된 fallback 경로로 AWS demo/QA 환경에 변경 사항을 반영한다.

    ## 완료 조건
    - ArgoCD sync가 가능하면 sync 상태와 application health가 확인된다.
    - fallback 배포를 사용한다면 그 이유와 명령, 결과가 기록되어 있다.
    - 배포 후 최소 smoke 요청이 성공하거나 실패 원인이 후속 작업으로 분리되어 있다.

    ## 남길 증거
    - ArgoCD sync 상태 캡처 또는 fallback 배포 로그
    - 배포 smoke 결과
    - 실패 시 후속 작업 목록
  done_when:
  - AWS 환경에 변경 사항을 반영하는 배포 경로가 검증되어 있다.
  - sync 또는 fallback 결과가 증거로 남아 있다.
  evidence:
  - ArgoCD sync 상태 캡처 또는 fallback 배포 로그
  - 배포 smoke 결과
  - 실패 시 후속 작업 목록
  estimate: 1.5
- local_id: gitops.rollback-runbook
  title: rollback 기준과 운영 runbook을 작성한다
  type: docs
  milestone: sprint-2-operations-policy
  labels:
  - scenario:s7
  - epic:gitops-argocd-release
  - rollback
  - runbook
  depends_on:
  - gitops.argocd-sync-smoke
  description: |
    ## 목표
    배포 실패나 장애 발생 시 어떤 기준으로 되돌릴지 운영 runbook으로 정리한다.

    ## 완료 조건
    - rollback 판단 기준이 정리되어 있다.
    - ArgoCD rollback, Git revert, image tag rollback 중 실제 사용할 절차가 구분되어 있다.
    - 독립 배포 검증과 연결할 수 있는 확인 명령이 포함되어 있다.

    ## 남길 증거
    - rollback runbook
    - 배포 확인 명령 목록
  done_when:
  - rollback 기준과 실행 절차가 문서화되어 있다.
  - 독립 배포 검증에서 재사용할 수 있는 확인 명령이 포함되어 있다.
  evidence:
  - rollback runbook
  - 배포 확인 명령 목록
  estimate: 1.0
