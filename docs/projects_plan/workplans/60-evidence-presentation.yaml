---
"$schema": "./linear-workplan.schema.json"
version: 1
defaults:
  team: KT CloudNative Study
  project: KT CloudNative Study 심화 프로젝트
  state: Backlog
  priority: 3
  labels:
  - kt-cloudnative-study
  - presentation
tasks:
- local_id: evidence.storyline
  title: 발표 흐름을 문제-목표-검증-결과-회고 순서로 작성한다
  type: docs
  milestone: final-prep
  labels:
  - scenario:s6
  - epic:evidence-presentation
  - presentation
  depends_on:
  - foundation.ready-definition
  - gitops.argocd-sync-smoke
  description: |
    ## 목표
    기능 나열식 발표가 아니라 운영 가능성 검증 이야기로 발표 흐름을 작성한다.

    ## 완료 조건
    - 문제, 목표, 설계, 검증, 결과, 회고 흐름이 있다.
    - 각 검증 시나리오가 어떤 운영 능력을 증명하는지 연결되어 있다.
    - 미완성 항목을 숨기지 않고 후속 과제로 다룬다.

    ## 남길 증거
    - 발표 스토리라인
    - 슬라이드 목차 초안
  done_when:
  - 발표 스토리라인이 문제-목표-검증-결과-회고 순서로 작성되어 있다.
  - 미완성 항목을 후속 과제로 설명할 자리가 있다.
  evidence:
  - 발표 스토리라인
  - 슬라이드 목차 초안
  estimate: 1.0
- local_id: evidence.architecture-diagram
  title: 핵심 아키텍처 다이어그램을 작성한다
  type: docs
  milestone: final-prep
  labels:
  - scenario:s6
  - epic:evidence-presentation
  - architecture
  depends_on:
  - e2e.normal-flow-capture
  - traffic.gateway-mesh-decision
  - gitops.argocd-sync-smoke
  description: |
    ## 목표
    발표에서 전체 구조와 핵심 요청 흐름을 이해할 수 있는 아키텍처 다이어그램을 작성한다.

    ## 완료 조건
    - 전체 구성요소는 4~6개 수준으로 단순화되어 있다.
    - 정상 흐름과 운영 검증 포인트가 구분되어 있다.
    - Gateway, Mesh, Observability, Security Policy의 역할이 보인다.

    ## 남길 증거
    - 아키텍처 다이어그램
    - 핵심 요청 흐름 다이어그램
  done_when:
  - 발표용 아키텍처 다이어그램이 작성되어 있다.
  - 핵심 요청 흐름과 운영 검증 포인트가 구분되어 있다.
  evidence:
  - 아키텍처 다이어그램
  - 핵심 요청 흐름 다이어그램
  estimate: 1.0
- local_id: evidence.capture-index
  title: 검증 결과 캡처를 최신 상태로 정리한다
  type: docs
  milestone: final-prep
  labels:
  - scenario:s6
  - epic:evidence-presentation
  - evidence
  depends_on:
  - observability.failure-capture
  - traffic.policy-evidence
  - devsecops.scan-summary
  - gitops.rollback-runbook
  related_to:
  - delivery.deployment-evidence
  description: |
    ## 목표
    발표에 사용할 운영 검증 증거를 최신 상태로 모은다.

    ## 완료 조건
    - 장애 관측, 통신 차단, 보안 스캔 결과가 최신 캡처로 정리되어 있다.
    - 각 캡처가 어떤 주장을 뒷받침하는지 설명되어 있다.
    - 독립 배포 결과는 완료 여부에 따라 핵심 또는 부록으로 분류되어 있다.

    ## 남길 증거
    - 검증 결과 캡처 목록
    - 캡처별 설명
  done_when:
  - 최소 2개 이상의 운영 검증 결과가 최신 증거로 정리되어 있다.
  - 각 증거가 발표 주장과 연결되어 있다.
  evidence:
  - 검증 결과 캡처 목록
  - 캡처별 설명
  estimate: 1.0
- local_id: evidence.rehearsal
  title: 10분 발표 리허설을 진행한다
  type: docs
  milestone: final-prep
  labels:
  - scenario:s6
  - epic:evidence-presentation
  - presentation
  depends_on:
  - evidence.storyline
  - evidence.architecture-diagram
  - evidence.capture-index
  description: |
    ## 목표
    발표 흐름이 10분 안에 자연스럽게 연결되는지 확인하고 부족한 부분을 수정한다.

    ## 완료 조건
    - 10분 리허설이 한 번 이상 진행되어 있다.
    - 설명이 막히는 시나리오나 증거 부족 항목이 기록되어 있다.
    - 발표 당일 시연 실패에 대비한 백업 캡처가 준비되어 있다.

    ## 남길 증거
    - 리허설 피드백
    - 백업 캡처 목록
  done_when:
  - 10분 발표 리허설이 진행되어 있다.
  - 피드백과 수정 항목이 정리되어 있다.
  evidence:
  - 리허설 피드백
  - 백업 캡처 목록
  estimate: 0.5
- local_id: evidence.followups-retro
  title: 미완성 항목과 후속 과제를 정리한다
  type: docs
  milestone: final-prep
  labels:
  - scenario:s6
  - epic:evidence-presentation
  - retrospective
  depends_on:
  - evidence.rehearsal
  description: |
    ## 목표
    완료한 것, 검증한 것, 미완성인 것, 다음에 개선할 것을 분리해 회고와 후속 과제로 정리한다.

    ## 완료 조건
    - 미완성 기능이 핵심 성과로 포장되지 않는다.
    - 후속 과제가 명확한 이유와 함께 정리되어 있다.
    - 다음 프로젝트에서 바꿀 작업 방식이 한 가지 이상 도출되어 있다.

    ## 남길 증거
    - 회고 문서
    - 후속 과제 목록
  done_when:
  - 미완성 항목과 후속 과제가 정리되어 있다.
  - 다음 스프린트 또는 다음 프로젝트에서 바꿀 행동이 기록되어 있다.
  evidence:
  - 회고 문서
  - 후속 과제 목록
  estimate: 0.5
