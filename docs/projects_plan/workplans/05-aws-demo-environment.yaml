---
"$schema": "./linear-workplan.schema.json"
version: 1
defaults:
  team: KT CloudNative Study
  project: KT CloudNative Study 심화 프로젝트
  state: Backlog
  priority: 3
  labels:
  - kt-cloudnative-study
  - aws
tasks:
- local_id: aws.terraform-inventory
  title: 현재 Terraform 구성과 생성 가능한 AWS 리소스를 확인한다
  type: planning
  milestone: phase-0-planning
  labels:
  - scenario:s0
  - epic:aws-demo-environment
  - terraform
  depends_on:
  - foundation.scope-prioritization
  description: |
    ## 목표
    현재 Terraform 기반이 어떤 AWS 리소스를 만들 수 있고, demo/QA 환경 구성에 무엇이 부족한지 확인한다.

    ## 완료 조건
    - Terraform 모듈, 변수, backend, provider 설정 범위가 정리되어 있다.
    - 생성 가능한 네트워크, 서버, 클러스터, registry 리소스가 구분되어 있다.
    - 아직 없는 개발/QA 서버 또는 운영 구성 요소가 gap으로 정리되어 있다.

    ## 남길 증거
    - Terraform 구성 인벤토리
    - AWS 환경 gap 목록
  done_when:
  - Terraform으로 생성 가능한 AWS 리소스와 부족한 리소스가 구분되어 있다.
  - demo/QA 환경 준비에 필요한 gap이 정리되어 있다.
  evidence:
  - Terraform 구성 인벤토리
  - AWS 환경 gap 목록
  estimate: 1.0
- local_id: aws.demo-env-scope
  title: AWS demo/QA 환경 최소 범위를 결정한다
  type: design
  milestone: phase-0-planning
  labels:
  - scenario:s0
  - epic:aws-demo-environment
  - planning
  depends_on:
  - aws.terraform-inventory
  description: |
    ## 목표
    5주 일정 안에서 최종 시연에 사용할 AWS 환경의 최소 범위를 결정한다.

    ## 완료 조건
    - 완전한 dev/QA 분리 대신 demo/QA 단일 환경으로 갈지 결정되어 있다.
    - 클러스터, registry, ingress/load balancer, observability 최소 범위가 정리되어 있다.
    - 로컬 검증을 백업으로 둘 조건이 정리되어 있다.

    ## 남길 증거
    - AWS demo/QA 환경 결정 기록
    - 최소 토폴로지 표
    - 백업 검증 기준
  done_when:
  - AWS demo/QA 환경의 최소 범위가 결정되어 있다.
  - 로컬 검증 백업 조건이 문서화되어 있다.
  evidence:
  - AWS demo/QA 환경 결정 기록
  - 최소 토폴로지 표
  - 백업 검증 기준
  estimate: 0.5
- local_id: aws.access-runbook
  title: AWS 접근 권한과 클러스터 접속 절차를 확인한다
  type: ops
  milestone: sprint-1-baseline
  labels:
  - scenario:s0
  - epic:aws-demo-environment
  - aws
  - access
  depends_on:
  - aws.demo-env-scope
  description: |
    ## 목표
    팀원이 AWS demo/QA 환경에 접근하고 클러스터 또는 서버 상태를 확인할 수 있는 절차를 정리한다.

    ## 완료 조건
    - AWS profile, 권한, kubeconfig 또는 SSH 접근 방식이 정리되어 있다.
    - 민감정보를 문서에 직접 저장하지 않는 원칙이 확인되어 있다.
    - 접근 실패 시 누구에게 어떤 정보를 공유해야 하는지 정리되어 있다.

    ## 남길 증거
    - AWS 접근 절차
    - 클러스터/서버 상태 확인 로그
  done_when:
  - AWS demo/QA 환경 접근 절차가 문서화되어 있다.
  - 클러스터 또는 서버 상태 확인 방법이 검증되어 있다.
  evidence:
  - AWS 접근 절차
  - 클러스터/서버 상태 확인 로그
  estimate: 1.0
- local_id: aws.image-registry-path
  title: 이미지 배포 경로와 registry 기준을 정리한다
  type: ops
  milestone: sprint-1-baseline
  labels:
  - scenario:s0
  - epic:aws-demo-environment
  - deployment
  - registry
  depends_on:
  - aws.demo-env-scope
  description: |
    ## 목표
    AWS demo/QA 환경에 서비스 이미지를 배포하기 위한 registry와 tag 기준을 정리한다.

    ## 완료 조건
    - ECR 또는 사용할 registry가 결정되어 있다.
    - 이미지 tag, digest, rollback 기준이 정리되어 있다.
    - GitHub Actions 또는 수동 push 중 단기 실행 방식이 결정되어 있다.

    ## 남길 증거
    - registry 결정 기록
    - image tag 기준
    - 배포 경로 다이어그램
  done_when:
  - 서비스 이미지 registry와 tag 기준이 정리되어 있다.
  - AWS 환경 배포 경로가 문서화되어 있다.
  evidence:
  - registry 결정 기록
  - image tag 기준
  - 배포 경로 다이어그램
  estimate: 1.0
- local_id: aws.demo-deploy-smoke
  title: AWS 환경 기본 배포 smoke를 실행한다
  type: test
  milestone: sprint-1-baseline
  labels:
  - scenario:s0
  - epic:aws-demo-environment
  - smoke
  depends_on:
  - aws.access-runbook
  - aws.image-registry-path
  description: |
    ## 목표
    AWS demo/QA 환경에 최소 서비스 또는 smoke 대상이 배포되고 접근 가능한지 확인한다.

    ## 완료 조건
    - 최소 배포 대상이 AWS 환경에 올라간다.
    - 클러스터 또는 서버에서 대상 상태가 확인된다.
    - Gateway/Ingress 또는 직접 접근 방식으로 smoke 요청이 성공한다.
    - 실패 시 로컬 검증 백업과 후속 작업이 분리되어 있다.

    ## 남길 증거
    - 배포 상태 로그
    - smoke 요청 결과
    - 실패 시 후속 작업 목록
  done_when:
  - AWS demo/QA 환경에서 기본 배포 smoke가 실행되어 있다.
  - 실패하거나 미완성인 항목이 후속 작업으로 분리되어 있다.
  evidence:
  - 배포 상태 로그
  - smoke 요청 결과
  - 실패 시 후속 작업 목록
  estimate: 1.5
